services:
  domovoy-gateway:
    build:
      context: ..
      dockerfile: Domovoy.ApiGateway/Dockerfile
    container_name: domovoy-gateway
    ports:
      - "8085:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Issuer=domovoy
      - Jwt__Audience=DomovoyClients
      - Jwt__Secret=CHANGE_THIS_IN_PRODUCTION_32_CHARS_MIN!!!
      - ConnectionStrings__Redis=redis:6379
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__User=admin
      - RabbitMQ__Pass=admin
    depends_on:
      domovoy-auth:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - domovoy_net
    volumes:
      - gateway_dataprotection:/root/.aspnet/DataProtection-Keys

  domovoy-auth:
    build:
      context: ..
      dockerfile: Domovoy.Auth.Service/Dockerfile
    container_name: domovoy-auth
    ports:
      - "8086:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=domovoy_auth;Username=postgres;Password=postgres
      - Jwt__Issuer=domovoy
      - Jwt__Audience=DomovoyClients
      - Jwt__Secret=CHANGE_THIS_IN_PRODUCTION_32_CHARS_MIN!!!
      - OpenIddict__Issuer=http://domovoy-auth:8080
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__User=admin
      - RabbitMQ__Pass=admin
      - ConnectionStrings__Redis=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - domovoy_net

  domovoy-device-manager:
    build:
      context: ..
      dockerfile: Domovoy.DeviceManager.Service/Dockerfile
    container_name: domovoy-device-manager
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=domovoy_auth;Username=postgres;Password=postgres
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__User=admin
      - RabbitMQ__Pass=admin
      - OpenIddict__Issuer=http://domovoy-auth:8080/
      - OpenIddict__ClientId=domovoy-device-manager
      - OpenIddict__ClientSecret=device-manager-secret
    ports:
      - "8087:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      domovoy-auth:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - domovoy_net

  postgres:
    image: postgres:16-alpine
    container_name: domovoy-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: domovoy_auth
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - domovoy_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d domovoy_auth"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: domovoy-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    networks:
      - domovoy_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: domovoy-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - domovoy_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  redisdata:
  domovoy_auth_data:
  gateway_dataprotection:

networks:
  domovoy_net:
    driver: bridge
